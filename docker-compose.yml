services:
  db:
    image: postgres:15
    container_name: hr-onboarding-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2722
      POSTGRES_DB: postgres 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: hr-onboarding-adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula

volumes:
  postgres_data: